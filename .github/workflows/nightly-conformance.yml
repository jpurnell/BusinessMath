name: Nightly Guideline Conformance

on:
  schedule:
    # 09:00 UTC daily (~05:00 ET) — well after CI quiet hours
    - cron: '0 9 * * *'
  workflow_dispatch:

concurrency:
  group: nightly-conformance
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  audit:
    name: Audit against development-guidelines
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: '6.0.3'

      - name: Install Node (for Claude Code CLI)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Create audit branch
        id: branch
        run: |
          BRANCH="nightly/conformance-$(date -u +%Y-%m-%d)"
          git config user.name "claude-conformance-bot"
          git config user.email "claude-conformance-bot@users.noreply.github.com"
          git checkout -b "$BRANCH"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Run conformance audit
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude --print --permission-mode acceptEdits --model claude-opus-4-6 \
            "$(cat .github/prompts/nightly-conformance.md)" \
            > audit-report.md

      - name: Check for changes
        id: diff
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run tests on auto-fixes
        if: steps.diff.outputs.changed == 'true'
        run: swift test

      - name: Commit and open PR
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git add -A
          git commit -m "nightly: guideline conformance $(date -u +%Y-%m-%d)" \
                     -m "Auto-generated by nightly-conformance workflow." \
                     -m "See audit-report.md for full findings."
          git push -u origin "${{ steps.branch.outputs.branch }}"
          gh pr create \
            --title "nightly: guideline conformance $(date -u +%Y-%m-%d)" \
            --body-file audit-report.md \
            --label "automation" \
            --label "conformance"

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-report
          path: audit-report.md
