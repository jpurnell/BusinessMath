name: CI

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  tests:
    name: Tests (${{ matrix.os }} / ${{ matrix.engine }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-26, ubuntu-24.04]
        engine: [swift-testing]
    env:
      PACKAGE_NAME: BusinessMath
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26.x (Swift 6.2)
        if: matrix.os == 'macos-26'
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_26* 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE_PATH" ]; then
            echo "No Xcode 26.x found, using default"
            xcodebuild -version
          else
            sudo xcode-select -s "$XCODE_PATH"
            echo "Selected: $XCODE_PATH"
            xcodebuild -version
          fi

      - name: Install Swift (Linux)
        if: matrix.os == 'ubuntu-24.04'
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: '6.2'

      - name: Cache Swift build (Linux)
        if: matrix.os == 'ubuntu-24.04'
        uses: actions/cache@v4
        with:
          path: .build-swift-testing
          key: ${{ runner.os }}-swift-${{ hashFiles('Package.swift', 'Package.resolved', 'Sources/**/*.swift') }}
          restore-keys: |
            ${{ runner.os }}-swift-

      - name: Tooling versions
        run: |
          swift --version
          if command -v xcodebuild >/dev/null 2>&1; then
            xcodebuild -version
          fi

      - name: Select test engine and scratch path
        run: |
          if [ "${{ matrix.engine }}" = "swift-testing" ]; then
            echo "SWIFT_TEST_FLAGS=--enable-swift-testing" >> $GITHUB_ENV
            echo "SCRATCH=.build-swift-testing" >> $GITHUB_ENV
          else
            echo "SWIFT_TEST_FLAGS=" >> $GITHUB_ENV
            echo "SCRATCH=.build-xctest" >> $GITHUB_ENV
          fi

      - name: Build + Test (Debug)
        run: |
          set -euo pipefail

          if [ "${{ matrix.engine }}" = "swift-testing" ]; then
            if ! swift test --enable-swift-testing --list-tests --scratch-path "$SCRATCH" | grep -q .; then
              echo "No Swift Testing (@Test) tests found; skipping swift-testing leg."
              exit 0
            fi
          else
            swift test --list-tests --scratch-path "$SCRATCH" || true
          fi

          swift build --build-tests $SWIFT_TEST_FLAGS --scratch-path "$SCRATCH" -v
          swift test  $SWIFT_TEST_FLAGS --scratch-path "$SCRATCH" -v

  build_and_compile:
    name: Release build
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26.x (Swift 6.2)
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_26* 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE_PATH" ]; then
            echo "No Xcode 26.x found, using default"
          else
            sudo xcode-select -s "$XCODE_PATH"
            echo "Selected: $XCODE_PATH"
          fi

      - name: Tooling versions
        run: |
          xcodebuild -version
          swift --version

      - name: Release build (SPM)
        run: swift build -c release -Xswiftc -Xfrontend -Xswiftc -solver-expression-time-threshold=500

  linux_compile:
    name: Linux release compile check
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Swift (Linux)
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: '6.2'

      - name: Cache Swift build (Linux)
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-swift-release-${{ hashFiles('Package.swift', 'Package.resolved', 'Sources/**/*.swift') }}
          restore-keys: |
            ${{ runner.os }}-swift-release-
            ${{ runner.os }}-swift-

      - name: Tooling versions
        run: swift --version

      - name: Release build (Linux)
        run: |
          set -euo pipefail
          swift build -c release -Xswiftc -Xfrontend -Xswiftc -solver-expression-time-threshold=500 -v

      - name: Compile tests (Linux, debug with enable-testing)
        run: |
          set -euo pipefail
          swift build --build-tests -c debug -Xswiftc -enable-testing -v
